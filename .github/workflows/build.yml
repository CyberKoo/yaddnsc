name: GitHub auto build

on: [ push, pull_request ]

jobs:
  linux-amd64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install dependencies
        run: sudo apt update; sudo apt install -y libssl-dev zlib1g zlib1g-dev
      - name: Create build directory
        run: mkdir build
      - name: Build
        run: cd build && cmake ../ -DCMAKE_BUILD_TYPE=Debug && make -s -j 2
  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install dependencies
        run: sudo apt update; sudo apt install -y libssl-dev zlib1g zlib1g-dev
      - name: Create build directory
        run: mkdir build
      - name: Build
        run: cd build && cmake ../ -DCMAKE_BUILD_TYPE=Debug && make -s -j 2
  macos-arm64:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install dependencies
        run: brew update; brew install openssl@3
      - name: Create build directory
        run: mkdir build
      - name: Build
        run: cd build && cmake ../ -DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3/ -DCMAKE_BUILD_TYPE=Debug && make -s -j 2
