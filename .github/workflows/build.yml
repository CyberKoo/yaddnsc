name: GitHub auto build

on: [push, pull_request]

jobs:
  linux-amd64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install dependencies
        run: sudo apt update; sudo apt install -y libssl-dev zlib1g zlib1g-dev
      - name: Build
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug && make -s -C build -j $(nproc)

  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install dependencies
        run: brew update; brew install openssl@3
      - name: Build
        run: cmake -B build -DOPENSSL_ROOT_DIR=/usr/local/opt/openssl@3/ -DCMAKE_BUILD_TYPE=Debug && make -s -C build -j $(nproc)
