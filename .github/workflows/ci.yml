name: GitHub auto build

on:
    push:
        branches: [master, dev, v0.x]
        paths-ignore:
            - "**.md"
            - ".gitignore"
            - "LICENSE"
            - ".github/**"
    pull_request:
        branches: [master, dev, v0.x]
        paths-ignore:
            - "**.md"
            - ".gitignore"
            - "LICENSE"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    linux-amd64:
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Install dependencies
              run: sudo apt update; sudo apt install -y ninja-build libssl-dev zlib1g zlib1g-dev pkg-config
            - name: Configure
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DYADDNSC_BUILD_TESTS=ON
            - name: Build
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: ninja -C build -j$(nproc)
            - name: Test
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: ctest --test-dir build --output-on-failure -j$(nproc)
    linux-arm64:
        runs-on: ubuntu-24.04-arm
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Install dependencies
              run: sudo apt update; sudo apt install -y ninja-build libssl-dev zlib1g zlib1g-dev pkg-config
            - name: Configure
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DYADDNSC_BUILD_TESTS=ON
            - name: Build
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: ninja -C build -j$(nproc)
            - name: Test
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: ctest --test-dir build --output-on-failure -j$(nproc)
    linux-amd64-musl:
        runs-on: ubuntu-24.04
        container: alpine:3
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Install dependencies
              run: apk add --no-cache build-base git cmake samurai openssl-dev zlib-dev pkgconfig
            - name: Configure
              run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DYADDNSC_BUILD_TESTS=ON
            - name: Build
              run: ninja -C build -j$(nproc)
            - name: Test
              run: ctest --test-dir build --output-on-failure -j$(nproc)
    macos-arm64:
        runs-on: macos-26
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Install dependencies
              run: brew update; brew install ninja openssl@3 pkg-config
            - name: Configure
              run: cmake -B build -G Ninja -DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3/ -DCMAKE_BUILD_TYPE=Debug -DYADDNSC_BUILD_TESTS=ON
            - name: Build
              run: ninja -C build -j$(nproc)
            - name: Test
              run: ctest --test-dir build --output-on-failure -j$(nproc)

    linux-amd64-feature-flags:
        runs-on: ubuntu-24.04
        strategy:
            matrix:
                config:
                    - name: release
                      cmake_flags: ""
                      apt_deps: ""
                    - name: native-dns
                      cmake_flags: "-DYADDNSC_USE_NATIVE_DNS=ON"
                      apt_deps: ""
                    - name: system-spdlog
                      cmake_flags: "-DYADDNSC_USE_SYSTEM_SPDLOG=ON"
                      apt_deps: "libspdlog-dev"
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Install dependencies
              run: |
                  sudo apt update
                  sudo apt install -y ninja-build libssl-dev zlib1g zlib1g-dev pkg-config ${{ matrix.config.apt_deps }}
            - name: Configure
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DYADDNSC_BUILD_TESTS=OFF ${{ matrix.config.cmake_flags }}
            - name: Build
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: ninja -C build -j$(nproc)

    linux-amd64-sanitizer:
        runs-on: ubuntu-24.04
        env:
            ASAN_OPTIONS: detect_stack_use_after_return=1:strict_string_checks=1:detect_invalid_pointer_pairs=2
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Install dependencies
              run: sudo apt update; sudo apt install -y ninja-build libssl-dev zlib1g zlib1g-dev pkg-config
            - name: Configure
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Sanitizer -DYADDNSC_BUILD_TESTS=ON
            - name: Build
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: ninja -C build -j$(nproc)
            - name: Test
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: ctest --test-dir build --output-on-failure -j$(nproc)

    linux-amd64-clang:
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Install dependencies
              run: sudo apt update; sudo apt install -y ninja-build clang-19 clang-tidy-19 libc++-19-dev libc++abi-19-dev libssl-dev zlib1g zlib1g-dev pkg-config
            - name: Configure
              env:
                  CC: clang-19
                  CXX: clang++-19
              run: >-
                  cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DYADDNSC_BUILD_TESTS=ON
                  -DCMAKE_CXX_FLAGS="-stdlib=libc++"
                  -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++"
                  -DCMAKE_SHARED_LINKER_FLAGS="-stdlib=libc++"
                  -DCMAKE_MODULE_LINKER_FLAGS="-stdlib=libc++"
            - name: Build
              env:
                  CC: clang-19
                  CXX: clang++-19
              run: ninja -C build -j$(nproc)
            - name: Test
              env:
                  CC: clang-19
                  CXX: clang++-19
              run: ctest --test-dir build --output-on-failure -j$(nproc)

    coverage:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v7
            - name: Install dependencies
              run: sudo apt update; sudo apt install -y ninja-build gcc-14 g++-14 libssl-dev zlib1g zlib1g-dev pkg-config lcov
            - name: Configure
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: >-
                  cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DYADDNSC_SANITIZE_DEBUG=OFF
                  -DYADDNSC_BUILD_TESTS=ON
                  -DCMAKE_CXX_FLAGS="--coverage -O0"
                  -DCMAKE_EXE_LINKER_FLAGS="--coverage"
            - name: Build
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: ninja -C build -j$(nproc)
            - name: Test
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: ctest --test-dir build --output-on-failure -j$(nproc)
            - name: Generate coverage report
              run: |
                  lcov --capture --directory build --gcov-tool gcov-14 --output-file coverage.info --ignore-errors mismatch
                  lcov --remove coverage.info '/usr/*' '*/test/*' '*/googletest*' '*/spdlog*' '*/glaze*' '*/magic_enum*' --output-file coverage.info --ignore-errors mismatch,unused
                  lcov --list coverage.info
            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v5
              with:
                  files: coverage.info
                  token: ${{ secrets.CODECOV_TOKEN }}
                  fail_ci_if_error: true
