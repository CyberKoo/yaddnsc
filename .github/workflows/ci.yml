name: CI tests

on:
    push:
        branches: [master, dev, v0.x]
        paths-ignore:
            - "**.md"
            - ".gitignore"
            - "LICENSE"
            - ".github/**"
    pull_request:
        branches: [master, dev, v0.x]
        paths-ignore:
            - "**.md"
            - ".gitignore"
            - "LICENSE"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    linux-amd64:
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Install dependencies
              run: sudo apt update; sudo apt install -y cmake git ninja-build gcc-14 g++-14 \
                  libssl-dev zlib1g zlib1g-dev pkg-config python3-venv curl
            - name: Configure
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DYADDNSC_BUILD_TESTS=ON
            - name: Build
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: ninja -C build -j$(nproc)
            - name: Test
              env:
                  CC: gcc-14
                  CXX: g++-14
              run: ctest --test-dir build --output-on-failure -j$(nproc)

    linux-amd64-musl:
        runs-on: ubuntu-24.04
        container: alpine:3
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Install dependencies
              run: apk add --no-cache build-base git cmake samurai openssl-dev zlib-dev pkgconfig
            - name: Configure
              run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DYADDNSC_BUILD_TESTS=ON
            - name: Build
              run: ninja -C build -j$(nproc)
            - name: Test
              run: ctest --test-dir build --output-on-failure -j$(nproc)

    macos-arm64:
        runs-on: macos-26
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Install dependencies
              run: brew update; brew install cmake git ninja openssl@3 pkg-config
            - name: Configure
              run: cmake -B build -G Ninja -DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3/ -DCMAKE_BUILD_TYPE=Debug -DYADDNSC_BUILD_TESTS=ON
            - name: Build
              run: ninja -C build -j$(getconf _NPROCESSORS_ONLN)
            - name: Test
              run: ctest --test-dir build --output-on-failure -j$(getconf _NPROCESSORS_ONLN)



    # ----------------------------------------------------------------------
    # Conversion warning gate.
    # -Wconversion -Wsign-conversion conflict heavily with the standard library
    # and common idioms, so they are NOT enabled on every local build. They run
    # here as a dedicated job to catch narrowing bugs before merge while keeping
    # developer velocity high. Restricted to pull_request so it does not build on
    # every push (the fast checks above already cover push correctness).
    # ----------------------------------------------------------------------
    conversion-gate:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-24.04
        env:
            CC: gcc-14
            CXX: g++-14
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Install dependencies
              run: sudo apt update; sudo apt install -y cmake git ninja-build gcc-14 g++-14 \
                  libssl-dev zlib1g zlib1g-dev pkg-config
            - name: Configure
              run: >-
                  cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DYADDNSC_BUILD_TESTS=ON
                  -DCMAKE_CXX_FLAGS="-Wconversion -Wsign-conversion"
            - name: Build
              run: ninja -C build -j$(nproc)
            - name: Test
              run: ctest --test-dir build --output-on-failure -j$(nproc)

    # ----------------------------------------------------------------------
    # Benchmark job — run performance benchmarks and check for regressions.
    # Currently only runs on PRs to provide quick feedback.
    # ----------------------------------------------------------------------
    benchmark:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-24.04
        env:
            CC: gcc-14
            CXX: g++-14
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Install dependencies
              run: sudo apt update; sudo apt install -y cmake git ninja-build gcc-14 g++-14 \
                  libssl-dev zlib1g zlib1g-dev pkg-config
            - name: Configure
              run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DYADDNSC_BUILD_TESTS=ON
            - name: Build benchmarks
              run: ninja -C build -j$(nproc) bench_dns_parser_native bench_dns_parser_system bench_uri bench_string_util bench_inet_address bench_socket_addr bench_builder
            - name: Run benchmarks
              run: |
                  set -o pipefail
                  for b in bench_dns_parser_native bench_dns_parser_system bench_uri bench_string_util bench_inet_address bench_socket_addr bench_builder; do
                      echo "=== $b ==="
                      ./build/test/perf/$b --benchmark_format=console 2>&1 | tail -n +12
                  done
